name: Node.js Library CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'gfless-nodejs/**'
      - 'gfless-cpp/**'
      - '.github/workflows/nodejs.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'gfless-nodejs/**'
      - 'gfless-cpp/**'
      - '.github/workflows/nodejs.yml'

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: gfless-nodejs/package-lock.json
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential cmake pkg-config \
          libcurl4-openssl-dev libssl-dev nlohmann-json3-dev python3-dev
    
    - name: Build C++ library
      working-directory: gfless-cpp
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)
    
    - name: Install Node.js dependencies
      working-directory: gfless-nodejs
      run: npm ci
    
    - name: Build native addon
      working-directory: gfless-nodejs
      run: npm run build:native
    
    - name: Build TypeScript
      working-directory: gfless-nodejs
      run: npm run build:ts
    
    - name: Run tests
      working-directory: gfless-nodejs
      run: npm test
    
    - name: Run examples
      working-directory: gfless-nodejs
      run: |
        echo "Running basic example..."
        timeout 30 node examples/basic_example.js || echo "Example completed"
        echo "Running encrypted example..."
        timeout 30 node examples/encrypted_example.js || echo "Example completed"

  test-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: gfless-nodejs/package-lock.json
    
    - name: Install system dependencies
      run: |
        brew update
        brew install cmake curl openssl nlohmann-json pkg-config
    
    - name: Build C++ library
      working-directory: gfless-cpp
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release \
          -DOPENSSL_ROOT_DIR=$(brew --prefix openssl)
        make -j$(sysctl -n hw.ncpu)
    
    - name: Install Node.js dependencies
      working-directory: gfless-nodejs
      run: npm ci
    
    - name: Build native addon
      working-directory: gfless-nodejs
      run: npm run build:native
    
    - name: Build TypeScript
      working-directory: gfless-nodejs
      run: npm run build:ts
    
    - name: Run tests
      working-directory: gfless-nodejs
      run: npm test
    
    - name: Run examples
      working-directory: gfless-nodejs
      run: |
        echo "Running basic example..."
        timeout 30 node examples/basic_example.js || echo "Example completed"
        echo "Running encrypted example..."
        timeout 30 node examples/encrypted_example.js || echo "Example completed"

  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: gfless-nodejs/package-lock.json
    
    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: '${{ github.workspace }}/vcpkg'
        vcpkgGitCommitId: '2024.01.12'
    
    - name: Install C++ dependencies
      run: |
        vcpkg install curl openssl nlohmann-json --triplet x64-windows
    
    - name: Build C++ library
      working-directory: gfless-cpp
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
        cmake --build . --config Release --parallel
    
    - name: Install Node.js dependencies
      working-directory: gfless-nodejs
      run: npm ci
    
    - name: Build native addon
      working-directory: gfless-nodejs
      run: npm run build:native
    
    - name: Build TypeScript
      working-directory: gfless-nodejs
      run: npm run build:ts
    
    - name: Run tests
      working-directory: gfless-nodejs
      run: npm test
    
    - name: Run examples
      working-directory: gfless-nodejs
      shell: cmd
      run: |
        echo Running basic example...
        timeout /t 30 node examples/basic_example.js || echo Example completed
        echo Running encrypted example...
        timeout /t 30 node examples/encrypted_example.js || echo Example completed

  test-coverage:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: gfless-nodejs/package-lock.json
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential cmake pkg-config \
          libcurl4-openssl-dev libssl-dev nlohmann-json3-dev python3-dev
    
    - name: Build C++ library
      working-directory: gfless-cpp
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)
    
    - name: Install Node.js dependencies
      working-directory: gfless-nodejs
      run: npm ci
    
    - name: Build native addon
      working-directory: gfless-nodejs
      run: npm run build:native
    
    - name: Build TypeScript
      working-directory: gfless-nodejs
      run: npm run build:ts
    
    - name: Run tests with coverage
      working-directory: gfless-nodejs
      run: |
        npm run test -- --coverage --coverageReporters=lcov
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: gfless-nodejs/coverage/lcov.info
        flags: nodejs
        name: nodejs-coverage

  lint-and-typecheck:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: gfless-nodejs/package-lock.json
    
    - name: Install dependencies
      working-directory: gfless-nodejs
      run: npm ci
    
    - name: TypeScript type check
      working-directory: gfless-nodejs
      run: npx tsc --noEmit
    
    - name: ESLint check (if configured)
      working-directory: gfless-nodejs
      run: |
        if [ -f .eslintrc.js ] || [ -f .eslintrc.json ]; then
          npx eslint src/ tests/ --ext .ts,.js
        else
          echo "ESLint not configured, skipping"
        fi
      continue-on-error: true

  performance-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: gfless-nodejs/package-lock.json
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential cmake pkg-config \
          libcurl4-openssl-dev libssl-dev nlohmann-json3-dev python3-dev
    
    - name: Build C++ library
      working-directory: gfless-cpp
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)
    
    - name: Install Node.js dependencies
      working-directory: gfless-nodejs
      run: npm ci
    
    - name: Build native addon
      working-directory: gfless-nodejs
      run: npm run build:native
    
    - name: Build TypeScript
      working-directory: gfless-nodejs
      run: npm run build:ts
    
    - name: Run performance tests
      working-directory: gfless-nodejs
      run: |
        node -e "
        const { Utils, Crypto } = require('./lib');
        
        console.log('Performance Test: Utils.randomString');
        const start1 = Date.now();
        for(let i = 0; i < 10000; i++) {
          Utils.randomString(32);
        }
        console.log('10k random strings (32 chars):', Date.now() - start1, 'ms');
        
        console.log('Performance Test: Crypto.sha512Hex');
        const start2 = Date.now();
        for(let i = 0; i < 1000; i++) {
          Crypto.sha512Hex('test data ' + i);
        }
        console.log('1k SHA512 hashes:', Date.now() - start2, 'ms');
        
        console.log('Performance tests completed');
        "

  publish-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: gfless-nodejs/package-lock.json
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential cmake pkg-config \
          libcurl4-openssl-dev libssl-dev nlohmann-json3-dev python3-dev
    
    - name: Build C++ library
      working-directory: gfless-cpp
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)
    
    - name: Install Node.js dependencies
      working-directory: gfless-nodejs
      run: npm ci
    
    - name: Build package
      working-directory: gfless-nodejs
      run: npm run build
    
    - name: Test package
      working-directory: gfless-nodejs
      run: npm pack --dry-run
    
    - name: Check package contents
      working-directory: gfless-nodejs
      run: |
        echo "Package would contain:"
        npm pack --dry-run | grep -E '^\s+[0-9]+\s+' || echo "Package contents check completed"